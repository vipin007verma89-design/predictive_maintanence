name: Predictive Maintenance CI/CD Pipeline

# Trigger the pipeline on every push or pull request to the main branch
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code into the runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the correct Python environment version matching your notebook
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip' # Caches dependencies to make subsequent runs faster

    # Step 3: Install system-level dependencies required for XGBoost (libgomp)
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgomp1

    # Step 4: Upgrade core package managers and install your project requirements
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # Step 5: Run a basic environment compatibility sanity check
    - name: Verify Environment Installation
      run: |
        python -c "import pandas as pd; import numpy as np; import sklearn; import xgboost; print('✅ All dependencies successfully imported and validated!')"
